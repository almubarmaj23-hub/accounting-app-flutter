name: 🔨 Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: 📦 Save our source files
        run: |
          cp -r lib /tmp/our_lib
          cp pubspec.yaml /tmp/our_pubspec.yaml

      - name: 🏗️ Create base Flutter Android project
        run: |
          flutter create --project-name financial_accounting_app --org com.accounting --platforms android .

      - name: 🔄 Restore our source files
        run: |
          rm -rf lib
          cp -r /tmp/our_lib lib
          cp /tmp/our_pubspec.yaml pubspec.yaml

      - name: 📥 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos || true

      - name: 🔨 Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: accounting-app-apk-v${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-*-release.apk
          retention-days: 90

      - name: 📋 Show APK info
        run: |
          echo "=== APK Files Built Successfully ==="
          ls -lh build/app/outputs/flutter-apk/app-*-release.apk
          echo "✅ Download from Actions > Artifacts tab"
